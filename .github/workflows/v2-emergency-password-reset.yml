name: V2 Emergency Password Reset (temporary)

# TEMPORARY — one-time recovery helper, removed after use. Directly resets
# a user's password_hash in the production/staging SQLite database over
# the existing SSH deploy channel, using the exact scrypt format
# lib/auth/password.ts expects (scrypt$N$r$p$salt$key). Needed because the
# admin reset-password button revokes every session for that user
# immediately, including the caller's own — there's no other recovery
# path for a locked-out sole admin.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [staging, production]
        default: production
      email:
        description: "Account email to reset"
        type: string
        required: true
      new_password:
        description: "New password (min 12 chars)"
        type: string
        required: true

jobs:
  reset:
    name: Reset password directly in the database
    runs-on: ubuntu-latest
    environment: xverse-${{ inputs.environment }}
    steps:
      - name: Reset over SSH
        uses: appleboy/ssh-action@v1
        env:
          TARGET_ENV: ${{ inputs.environment }}
          TARGET_EMAIL: ${{ inputs.email }}
          NEW_PASSWORD: ${{ inputs.new_password }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: TARGET_ENV,TARGET_EMAIL,NEW_PASSWORD
          script: |
            set -e
            if [ "$TARGET_ENV" = "production" ]; then CN=xverse-prod; else CN=xverse-staging; fi
            docker exec -i \
              -e TARGET_EMAIL="$TARGET_EMAIL" \
              -e NEW_PASSWORD="$NEW_PASSWORD" \
              "$CN" node -e '
                const crypto = require("crypto");
                const Database = require("better-sqlite3");
                const db = new Database(process.env.DATABASE_PATH || "/data/xverse.db");

                const N = 2 ** 15, R = 8, P = 1, KEYLEN = 32, SALTLEN = 16;
                const salt = crypto.randomBytes(SALTLEN);
                const key = crypto.scryptSync(process.env.NEW_PASSWORD, salt, KEYLEN, { N, r: R, p: P, maxmem: 128 * N * R * 2 });
                const hash = `scrypt$${N}$${R}$${P}$${salt.toString("base64url")}$${key.toString("base64url")}`;

                const user = db.prepare("SELECT id FROM users WHERE email = ?").get(process.env.TARGET_EMAIL.toLowerCase());
                if (!user) { console.error("NOT_FOUND: " + process.env.TARGET_EMAIL); process.exit(1); }

                db.prepare("UPDATE users SET password_hash = ?, updated_at = ? WHERE id = ?")
                  .run(hash, Date.now(), user.id);
                db.prepare("DELETE FROM sessions WHERE user_id = ?").run(user.id);
                db.prepare(
                  "INSERT INTO audit_log (actor_id, actor_email, action, entity_type, entity_id, detail, created_at) VALUES (?, ?, ?, ?, ?, ?, ?)"
                ).run(null, "system:emergency-reset", "user.reset_password", "user", user.id, JSON.stringify({ email: process.env.TARGET_EMAIL, via: "emergency-workflow" }), Date.now());

                console.log("OK: password reset for user " + user.id);
              '
