name: Vendor assets

# One-off, manual-only helper: downloads generated design assets (from the
# Higgsfield CDN, which the authoring sandbox cannot reach directly),
# converts them to webp, and commits them to the branch it was dispatched
# on. Delete this workflow once the assets are vendored.
on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Space-separated image URLs to vendor"
        type: string
        required: true

permissions:
  contents: write

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and convert to webp
        run: |
          set -euo pipefail
          mkdir -p public/images
          i=0
          for url in ${{ inputs.urls }}; do
            i=$((i+1))
            curl -fsSL -o "/tmp/asset-$i" "$url"
            convert "/tmp/asset-$i" -quality 82 "public/images/nebula-$i.webp"
            ls -la "public/images/nebula-$i.webp"
          done

      - name: Commit assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/images
          git commit -m "chore: vendor generated nebula asset candidates"
          git push
