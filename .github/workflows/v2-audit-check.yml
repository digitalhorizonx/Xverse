name: V2 Audit Check (temporary)

# TEMPORARY — read-only operational checks for a security/readiness audit.
# Never prints secret values, only presence/absence and non-sensitive
# metadata. Removed after use.

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [staging, production]
        default: production

jobs:
  check:
    runs-on: ubuntu-latest
    environment: xverse-${{ inputs.environment }}
    steps:
      - name: Read-only ops audit over SSH
        uses: appleboy/ssh-action@v1
        env:
          TARGET_ENV: ${{ inputs.environment }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: TARGET_ENV
          script: |
            set -e
            DIR=/opt/horizonx/products/xverse/$TARGET_ENV
            cd "$DIR"
            if [ "$TARGET_ENV" = "production" ]; then CN=xverse-prod; else CN=xverse-staging; fi

            echo "== .env key presence (values never shown) =="
            for KEY in SESSION_SECRET ADMIN_BOOTSTRAP_EMAIL ADMIN_BOOTSTRAP_PASSWORD DATABASE_PATH IMAGE_TAG; do
              if grep -q "^${KEY}=..*" .env 2>/dev/null; then
                echo "$KEY: present"
              else
                echo "$KEY: absent"
              fi
            done

            echo "== crontab (this VPS user) =="
            crontab -l 2>/dev/null | grep -v '^#' | grep . || echo "(no crontab entries)"

            echo "== backup snapshots on disk =="
            ls -la /opt/horizonx/backups/xverse/$TARGET_ENV/ 2>/dev/null | tail -5 || echo "(backup directory not found)"

            echo "== container security posture =="
            docker inspect "$CN" --format 'ReadonlyRootfs: {{.HostConfig.ReadonlyRootfs}}  RestartPolicy: {{.HostConfig.RestartPolicy.Name}}  SecurityOpt: {{.HostConfig.SecurityOpt}}'

            echo "== disk usage on the data volume =="
            docker exec "$CN" du -sh /data 2>/dev/null || echo "(could not read)"

            echo "== users table row count (no PII) =="
            docker exec "$CN" node -e '
              const Database = require("better-sqlite3");
              const db = new Database(process.env.DATABASE_PATH || "/data/xverse.db");
              const u = db.prepare("SELECT COUNT(*) c FROM users").get();
              const a = db.prepare("SELECT COUNT(*) c FROM users WHERE role = ? AND active = 1").get("admin");
              const s = db.prepare("SELECT COUNT(*) c FROM sessions").get();
              const sc = db.prepare("SELECT COUNT(*) c FROM showcases").get();
              const pub = db.prepare("SELECT COUNT(*) c FROM showcases WHERE status = ?").get("published");
              const al = db.prepare("SELECT COUNT(*) c FROM audit_log").get();
              console.log("users:", u.c, "| active admins:", a.c, "| live sessions:", s.c);
              console.log("showcases:", sc.c, "| published:", pub.c);
              console.log("audit_log entries:", al.c);
            '
