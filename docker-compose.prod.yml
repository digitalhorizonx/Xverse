# Production deployment. Run from the VPS deploy directory:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d

services:
  app:
    image: ${IMAGE:-ghcr.io/digitalhorizonx/xverse}:${IMAGE_TAG:-production-latest}
    container_name: xverse-prod
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    env_file:
      - .env.production
    ports:
      # Bound to localhost only — nginx on the host is the public entry point.
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
