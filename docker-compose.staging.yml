# Staging deployment. Run from the VPS deploy directory:
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d

services:
  app:
    image: ${IMAGE:-ghcr.io/digitalhorizonx/xverse}:${IMAGE_TAG:-staging-latest}
    container_name: xverse-staging
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    env_file:
      - .env.staging
    ports:
      # Bound to localhost only — nginx on the host is the public entry point.
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
